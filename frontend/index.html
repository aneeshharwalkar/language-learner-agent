<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Learner Agent</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>Language Learner</h1>
      <div class="dialect-selector">
        <label for="dialect">Dialect</label>
        <span id="dialect-flag" aria-hidden="true">🇲🇽</span>
        <select id="dialect">
          <option value="mexican-spanish">Mexican Spanish</option>
          <option value="castilian-spanish">Castilian Spanish</option>
        </select>
      </div>
    </div>
  </header>

  <main>
    <div id="chat-window">
      <div id="messages">
        <div class="system-msg">Select a dialect above and start chatting in Spanish. The agent will respond, correct mistakes, and share vocabulary tips.</div>
      </div>
    </div>

    <form id="chat-form">
      <input
        type="text"
        id="user-input"
        placeholder="Type a message in Spanish..."
        autocomplete="off"
        autofocus
      />
      <button type="submit" id="send-btn">Send</button>
    </form>
  </main>

  <script>
    const USE_MOCK = false;
    const API_URL = "http://localhost:8080/chat";
    const FETCH_TIMEOUT_MS = 15000;

    const DIALECTS = {
      "mexican-spanish": {
        flag: "🇲🇽",
        mock: {
          reply: "¡Claro que sí! En México usamos mucho el tuteo informal. ¿De qué quieres hablar hoy?",
          agent: "Mexican Spanish Agent",
          correction: "You wrote 'Yo quiero ir a la tienda' — that's grammatically correct! In casual speech, the 'Yo' subject pronoun is often dropped: 'Quiero ir a la tienda.'",
          vocab_tip: "Tienda can mean 'store' or 'tent' depending on context. For a shop, you can also say 'la tiendita' (little shop) in everyday Mexican Spanish."
        }
      },
      "castilian-spanish": {
        flag: "🇪🇸",
        mock: {
          reply: "¡Por supuesto! En España usamos el vosotros para el plural informal. ¿En qué puedo ayudarte?",
          agent: "Castilian Spanish Agent",
          correction: null,
          vocab_tip: "In Spain, 'vosotros' is the standard informal second-person plural. In Latin America, 'ustedes' is used for both formal and informal plural."
        }
      }
    };

    async function sendMessage(dialect, message, turn) {
      if (USE_MOCK) {
        await new Promise(r => setTimeout(r, 600));
        return DIALECTS[dialect]?.mock ?? DIALECTS["mexican-spanish"].mock;
      }

      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ dialect, message, turn }),
          signal: controller.signal
        });
        if (!res.ok) {
          let errorMsg = `Server error: ${res.status}`;
          try {
            const body = await res.json();
            if (body.error) errorMsg = body.error;
          } catch (_) {}
          throw new Error(errorMsg);
        }
        return res.json();
      } finally {
        clearTimeout(timer);
      }
    }

    let turn = 0;

    const messagesEl = document.getElementById("messages");
    const form       = document.getElementById("chat-form");
    const input      = document.getElementById("user-input");
    const sendBtn    = document.getElementById("send-btn");
    const dialectEl  = document.getElementById("dialect");
    const flagEl     = document.getElementById("dialect-flag");

    dialectEl.addEventListener("change", () => {
      flagEl.textContent = DIALECTS[dialectEl.value].flag;
      const dialectName = dialectEl.options[dialectEl.selectedIndex].text;
      const msg = document.createElement("div");
      msg.className = "system-msg";
      msg.textContent = `— Switched to ${dialectName} —`;
      messagesEl.appendChild(msg);
      scrollToBottom();
    });

    function escapeHtml(str) {
      const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" };
      return str.replace(/[&<>"]/g, c => map[c]);
    }

    function createCallout(icon, label, content, modifier) {
      const el = document.createElement("div");
      el.className = `callout callout-${modifier}`;
      el.innerHTML = `<span class="callout-icon">${icon}</span><span class="callout-text"><strong>${label}:</strong> ${escapeHtml(content)}</span>`;
      return el;
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendUserMessage(text) {
      const div = document.createElement("div");
      div.className = "message user-message";
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function appendAgentMessage(data) {
      const wrapper = document.createElement("div");
      wrapper.className = "message-group";

      const label = document.createElement("div");
      label.className = "agent-label";
      label.textContent = data.agent;
      const langTag = document.createElement("span");
      langTag.className = "lang-tag";
      langTag.textContent = "ES";
      label.appendChild(langTag);
      wrapper.appendChild(label);

      const reply = document.createElement("div");
      reply.className = "message agent-message";
      reply.setAttribute("lang", "es");
      reply.textContent = data.reply;
      wrapper.appendChild(reply);

      if (data.correction) wrapper.appendChild(createCallout("✏️", "Correction", data.correction, "correction"));
      if (data.vocab_tip)  wrapper.appendChild(createCallout("📖", "Vocab tip",  data.vocab_tip,  "vocab"));

      messagesEl.appendChild(wrapper);
      scrollToBottom();
    }

    function appendErrorMessage(msg) {
      const div = document.createElement("div");
      div.className = "system-msg error-msg";
      div.textContent = msg;
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function setLoading(loading) {
      sendBtn.disabled    = loading;
      input.disabled      = loading;
      sendBtn.textContent = loading ? "..." : "Send";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      const dialect = dialectEl.value;
      input.value = "";
      appendUserMessage(message);
      setLoading(true);

      try {
        const data = await sendMessage(dialect, message, turn);
        turn++;
        appendAgentMessage(data);
      } catch (err) {
        appendErrorMessage(
          err.name === "AbortError"
            ? "Request timed out. Is the backend running?"
            : err.message.startsWith("Server error:")
              ? err.message
              : "Could not reach the backend. Is the server running?"
        );
      } finally {
        setLoading(false);
        input.focus();
      }
    });
  </script>
</body>
</html>
